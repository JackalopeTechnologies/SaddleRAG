name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    # Opt JS-based actions into Node 24 ahead of the June 2026 default switch so
    # we don't carry deprecation warnings for actions that still ship a Node 20
    # binary internally (e.g. actions/upload-artifact@v4).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
              $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } else {
              $version = "0.0.0"
          }

          # The git tag IS the MSI ProductVersion - no translation. Versioning policy:
          #   0.1.N -> alpha series (prerelease)
          #   0.2.N -> beta series  (prerelease)
          #   any 0.x.y -> prerelease
          #   1.0.0 and above -> stable
          $msiVersion = $version
          if ($version -match '^0\.') {
              $isPrerelease = "true"
          } else {
              $isPrerelease = "false"
          }

          echo "PackageVersion=$version" >> $env:GITHUB_ENV
          echo "MsiVersion=$msiVersion" >> $env:GITHUB_ENV
          echo "IsPrerelease=$isPrerelease" >> $env:GITHUB_ENV
          Write-Host "Version: $version (MSI: $msiVersion, Prerelease: $isPrerelease)"

      - name: Restore
        run: dotnet restore SaddleRAG.slnx

      - name: Build
        run: dotnet build SaddleRAG.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true -p:Version=${{ env.PackageVersion }}

      - name: Test
        # Integration tests (Mongo-backed repositories, Playwright-driven
        # crawler scenarios) require services that aren't running on the
        # GitHub-hosted runner. They're tagged [Trait("Category","Integration")]
        # and run locally and on self-hosted runners that have those services.
        run: dotnet test SaddleRAG.slnx --configuration Release --no-build --filter "Category!=Integration"

      - name: Publish
        run: dotnet publish SaddleRAG.Mcp/SaddleRAG.Mcp.csproj --configuration Release --runtime win-x64 --self-contained true --output ./artifacts/${{ env.PackageVersion }}/publish -p:Version=${{ env.PackageVersion }}

      - name: Install WiX
        run: dotnet tool install --global wix --version 5.0.2

      - name: Add WiX extensions
        run: |
          wix extension add WixToolset.Util.wixext/5.0.2
          wix extension add WixToolset.UI.wixext/5.0.2

      - name: Build MSI
        run: wix build SaddleRAG.Installer/Package.wxs -d PublishDir=${{ github.workspace }}/artifacts/${{ env.PackageVersion }}/publish -d Version=${{ env.MsiVersion }} -d PluginSourceDir=${{ github.workspace }}/plugin -ext WixToolset.Util.wixext -ext WixToolset.UI.wixext -arch x64 -b SaddleRAG.Installer -o ./artifacts/${{ env.PackageVersion }}/SaddleRAG.Mcp.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: SaddleRAG.Mcp-${{ env.PackageVersion }}
          path: ./artifacts/${{ env.PackageVersion }}/SaddleRAG.Mcp.msi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: ./artifacts/${{ env.PackageVersion }}/SaddleRAG.Mcp.msi
          prerelease: ${{ env.IsPrerelease }}
          draft: true

      - name: Kill orphan processes
        if: always()
        run: |
          Get-Process -Name dotnet, VBCSCompiler -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue
