name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore DocRAG.slnx

      - name: Build
        run: dotnet build DocRAG.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test DocRAG.slnx --configuration Release --no-build
