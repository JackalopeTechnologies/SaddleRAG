name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
              $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } else {
              $version = "0.0.0"
          }

          # The git tag IS the MSI ProductVersion - no translation. Versioning policy:
          #   0.1.N -> alpha series (prerelease)
          #   0.2.N -> beta series  (prerelease)
          #   any 0.x.y -> prerelease
          #   1.0.0 and above -> stable
          $msiVersion = $version
          if ($version -match '^0\.') {
              $isPrerelease = "true"
          } else {
              $isPrerelease = "false"
          }

          # Emit as step outputs (tracked by the GitHub Actions schema
          # validator) rather than $GITHUB_ENV, which is a runtime
          # side-effect the validator can't follow. Downstream steps read
          # these via the step-id output reference syntax below.
          echo "PackageVersion=$version" >> $env:GITHUB_OUTPUT
          echo "MsiVersion=$msiVersion" >> $env:GITHUB_OUTPUT
          echo "IsPrerelease=$isPrerelease" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version (MSI: $msiVersion, Prerelease: $isPrerelease)"

      - name: Restore
        run: dotnet restore SaddleRAG.slnx

      - name: Build
        run: dotnet build SaddleRAG.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true -p:Version=${{ steps.version.outputs.PackageVersion }}

      - name: Test
        # Integration tests (Mongo-backed repositories, Playwright-driven
        # crawler scenarios) require services that aren't running on the
        # GitHub-hosted runner. They're tagged [Trait("Category","Integration")]
        # and run locally and on self-hosted runners that have those services.
        run: dotnet test SaddleRAG.slnx --configuration Release --no-build --filter "Category!=Integration"

      - name: Publish
        run: dotnet publish SaddleRAG.Mcp/SaddleRAG.Mcp.csproj --configuration Release --runtime win-x64 --self-contained true --output ./artifacts/${{ steps.version.outputs.PackageVersion }}/publish -p:Version=${{ steps.version.outputs.PackageVersion }}

      - name: Publish CLI
        run: dotnet publish SaddleRAG.Cli/SaddleRAG.Cli.csproj --configuration Release --runtime win-x64 --self-contained true --output ./artifacts/${{ steps.version.outputs.PackageVersion }}/publish -p:Version=${{ steps.version.outputs.PackageVersion }}

      - name: Install WiX
        run: dotnet tool install --global wix --version 5.0.2

      - name: Add WiX extensions
        run: |
          wix extension add WixToolset.Util.wixext/5.0.2
          wix extension add WixToolset.UI.wixext/5.0.2

      - name: Build MSI
        run: wix build SaddleRAG.Installer/Package.wxs -d PublishDir=${{ github.workspace }}/artifacts/${{ steps.version.outputs.PackageVersion }}/publish -d Version=${{ steps.version.outputs.MsiVersion }} -ext WixToolset.Util.wixext -ext WixToolset.UI.wixext -arch x64 -b SaddleRAG.Installer -o ./artifacts/${{ steps.version.outputs.PackageVersion }}/SaddleRAG.Mcp-${{ steps.version.outputs.PackageVersion }}.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: SaddleRAG.Mcp-${{ steps.version.outputs.PackageVersion }}
          path: ./artifacts/${{ steps.version.outputs.PackageVersion }}/SaddleRAG.Mcp-${{ steps.version.outputs.PackageVersion }}.msi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/${{ steps.version.outputs.PackageVersion }}/SaddleRAG.Mcp-${{ steps.version.outputs.PackageVersion }}.msi
          prerelease: ${{ steps.version.outputs.IsPrerelease }}
          draft: true

      - name: Kill orphan processes
        if: always()
        run: |
          Get-Process -Name dotnet, VBCSCompiler -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0"
          fi
          if [[ "${VERSION}" == 0.* ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi
          echo "PackageVersion=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "IsPrerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION} (Prerelease: ${IS_PRERELEASE})"

      - name: Restore
        # UseGpu=false must be passed at restore time as well as build time.
        # The Ingestion csproj conditionally references Microsoft.ML.OnnxRuntime
        # (CPU, has linux native libonnxruntime.so) when UseGpu=false and
        # Microsoft.ML.OnnxRuntime.DirectML (Windows-only, no linux .so) when
        # UseGpu=true. NuGet restore makes the package-selection decision —
        # without the flag here it pulls DirectML, build then picks CPU per
        # the conditional but the CPU package's native asset isn't in the
        # restore cache, and the test bin ends up without libonnxruntime.so
        # (DllNotFoundException at test time).
        run: dotnet restore SaddleRAG.slnx -p:UseGpu=false

      - name: Build
        run: dotnet build SaddleRAG.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true -p:UseGpu=false -p:Version=${{ steps.version.outputs.PackageVersion }}

      - name: Test (with coverage)
        # --collect:"XPlat Code Coverage" picks up coverlet.collector
        # already referenced by SaddleRAG.Tests.csproj. Output lands under
        # ./coverage-results/<guid>/coverage.cobertura.xml — one file per
        # test project run. The downstream coverage-report job merges this
        # with integration-test-linux's coverage XML and renders a single
        # combined report + sticky PR comment.
        run: dotnet test SaddleRAG.slnx --configuration Release --no-build -p:UseGpu=false --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage-results

      - name: Upload unit coverage XML
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit-${{ steps.version.outputs.PackageVersion }}
          path: ./coverage-results/**/coverage.cobertura.xml
          # Fail loudly when the Test step "succeeded" but produced no XML —
          # signals a coverlet.collector attach failure that the green check
          # would otherwise hide.
          if-no-files-found: error

      - name: Publish
        run: dotnet publish SaddleRAG.Mcp/SaddleRAG.Mcp.csproj --configuration Release --runtime linux-x64 --self-contained true -p:UseGpu=false -p:Version=${{ steps.version.outputs.PackageVersion }} --output ./artifacts/linux/publish

      - name: Package tarball
        run: |
          VERSION="${{ steps.version.outputs.PackageVersion }}"
          TARBALL="SaddleRAG.Mcp-${VERSION}-linux-x64.tar.gz"
          tar -czf "./artifacts/${TARBALL}" -C ./artifacts/linux/publish .
          sha256sum "./artifacts/${TARBALL}" > "./artifacts/${TARBALL}.sha256"

      - name: Upload linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: SaddleRAG.Mcp-linux-${{ steps.version.outputs.PackageVersion }}
          path: |
            ./artifacts/SaddleRAG.Mcp-${{ steps.version.outputs.PackageVersion }}-linux-x64.tar.gz
            ./artifacts/SaddleRAG.Mcp-${{ steps.version.outputs.PackageVersion }}-linux-x64.tar.gz.sha256

      - name: Upload to GitHub Release
        # Idempotent upsert via softprops/action-gh-release — same action
        # build-windows uses for the MSI. Both jobs run in parallel; whichever
        # arrives first creates the draft release with the prerelease flag,
        # the other appends its artifact files. No coordination required.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/SaddleRAG.Mcp-${{ steps.version.outputs.PackageVersion }}-linux-x64.tar.gz
            ./artifacts/SaddleRAG.Mcp-${{ steps.version.outputs.PackageVersion }}-linux-x64.tar.gz.sha256
          prerelease: ${{ steps.version.outputs.IsPrerelease }}
          draft: true

  docker:
    runs-on: ubuntu-latest
    needs: [build-linux]

    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0"
          fi
          echo "PackageVersion=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CPU image (PR/push — no push)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/jackalopetechnologies/saddlerag:dev

      - name: Build CUDA image (PR/push — no push)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cuda
          push: false
          tags: ghcr.io/jackalopetechnologies/saddlerag:dev-cuda

      - name: Build and push CPU image (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jackalopetechnologies/saddlerag:${{ steps.version.outputs.PackageVersion }}
            ghcr.io/jackalopetechnologies/saddlerag:${{ steps.version.outputs.PackageVersion }}-cpu
            ghcr.io/jackalopetechnologies/saddlerag:latest
            ghcr.io/jackalopetechnologies/saddlerag:cpu

      - name: Build and push CUDA image (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cuda
          push: true
          tags: |
            ghcr.io/jackalopetechnologies/saddlerag:${{ steps.version.outputs.PackageVersion }}-cuda
            ghcr.io/jackalopetechnologies/saddlerag:cuda

  integration-test-linux:
    # Runs the `[Trait("Category", "Integration")]` tests that depend on a
    # real Mongo / network. They're gated out of `build-linux` because
    # they need infrastructure, not because they're flaky — wiring them
    # up here lets the suite catch regressions in the Mongo-backed
    # repositories and ecosystem (NuGet / npm / pip) integrations.
    #
    # This job is intentionally NOT included in the `build` aggregate
    # below. Failures here surface as a separate red check on the PR
    # without blocking the existing required `build` gate. Promote into
    # `needs:` once a few runs prove stability — for now, "loud signal,
    # no gate."
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        # Healthcheck so the Test step doesn't race the mongod startup.
        # `mongosh --eval "db.adminCommand('ping')"` is the canonical
        # one-shot readiness probe.
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Determine version
        # Matches build-linux so the coverage artifact uploaded below can be
        # paired with the unit-coverage artifact by the coverage-report job.
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0"
          fi
          echo "PackageVersion=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore SaddleRAG.slnx -p:UseGpu=false

      - name: Build
        run: dotnet build SaddleRAG.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true -p:UseGpu=false

      - name: Install Playwright browsers
        # FileScrapeAuditTests and DryRunAuditTests instantiate the real
        # PageCrawler, which launches a Playwright Chromium. The browser
        # binary doesn't ship with the NuGet package — the publish output
        # (test bin in this case) emits a playwright.ps1 helper that
        # downloads it. --with-deps also `apt-get`s the system deps
        # Playwright needs on a fresh Ubuntu runner.
        run: pwsh SaddleRAG.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Cache ONNX models
        # OnnxProviderIntegrationTests skip when the model files aren't
        # present on disk. We cache them between CI runs so the bandwidth
        # cost is one-time per model version. The cache key includes the
        # specific RepoId + ModelFile filenames so a bump in
        # OnnxProviderIntegrationTests.BuildSettingsWith* invalidates
        # correctly. Models live where OnnxProviderIntegrationTests
        # expects them: Scratch/onnx-spike/models/{name}/.
        id: cache-onnx-models
        uses: actions/cache@v5
        with:
          path: Scratch/onnx-spike/models
          key: onnx-models-nomic-v1.5-fp16-mxbai-base-v1-quantized

      - name: Download ONNX models (cache miss)
        # Mirrors what OnnxModelDownloader does at runtime: pulls the
        # active embedding + reranker model + tokenizer files from
        # HuggingFace into the directory layout the tests probe.
        # nomic-embed-text-v1.5 onnx/model_fp16.onnx is ~140 MB,
        # mxbai-rerank-base-v1 onnx/model_quantized.onnx is ~180 MB.
        if: steps.cache-onnx-models.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          NOMIC_DIR=Scratch/onnx-spike/models/nomic-embed-text-v1.5
          MXBAI_DIR=Scratch/onnx-spike/models/mxbai-rerank-base-v1
          mkdir -p "$NOMIC_DIR" "$MXBAI_DIR"
          curl -L -f --retry 3 --retry-delay 5 -o "$NOMIC_DIR/model.onnx" \
            https://huggingface.co/nomic-ai/nomic-embed-text-v1.5/resolve/main/onnx/model_fp16.onnx
          curl -L -f --retry 3 --retry-delay 5 -o "$NOMIC_DIR/vocab.txt" \
            https://huggingface.co/nomic-ai/nomic-embed-text-v1.5/resolve/main/vocab.txt
          curl -L -f --retry 3 --retry-delay 5 -o "$MXBAI_DIR/model.onnx" \
            https://huggingface.co/mixedbread-ai/mxbai-rerank-base-v1/resolve/main/onnx/model_quantized.onnx
          curl -L -f --retry 3 --retry-delay 5 -o "$MXBAI_DIR/spm.model" \
            https://huggingface.co/mixedbread-ai/mxbai-rerank-base-v1/resolve/main/spm.model

      - name: Run integration tests (with coverage)
        # --collect:"XPlat Code Coverage" captures the lines integration tests
        # actually exercise (Mongo-backed repositories, real PageCrawler /
        # Playwright paths, ONNX provider). The coverage-report job merges
        # this XML with build-linux's unit XML so the PR comment reflects the
        # union, not unit-only.
        run: dotnet test SaddleRAG.slnx --configuration Release --no-build -p:UseGpu=false --filter "Category=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage-results

      - name: Upload integration coverage XML
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration-${{ steps.version.outputs.PackageVersion }}
          path: ./coverage-results/**/coverage.cobertura.xml
          # Mirrors build-linux: if the test step "succeeded" but produced no
          # XML, that's a coverlet attach failure and we want it to be loud
          # rather than silently degrade the merged report.
          if-no-files-found: error

  coverage-report:
    # Merges unit-test coverage (build-linux) with integration-test coverage
    # (integration-test-linux) into a single report + sticky PR comment. Runs
    # whenever at least one upstream produced XML so a partial signal still
    # surfaces — e.g. one test step failed but its upload-artifact step still
    # ran (it's gated on success() || failure()), or one whole job failed and
    # the other succeeded. The Verify step below decides what's actionable.
    # `if: !cancelled()` is needed to override GitHub Actions' default of
    # skipping when a `needs:` dependency fails.
    runs-on: ubuntu-latest
    needs: [build-linux, integration-test-linux]
    if: ${{ !cancelled() }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0"
          fi
          echo "PackageVersion=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download unit coverage XML
        # continue-on-error so a build-linux failure doesn't block surfacing
        # whatever integration coverage we have. The downstream
        # reportgenerator step glob-merges everything that landed.
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit-${{ steps.version.outputs.PackageVersion }}
          path: ./coverage-artifacts/unit

      - name: Download integration coverage XML
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: coverage-integration-${{ steps.version.outputs.PackageVersion }}
          path: ./coverage-artifacts/integration

      - name: Verify at least one XML landed
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          matches=( ./coverage-artifacts/**/coverage.cobertura.xml )
          if (( ${#matches[@]} == 0 )); then
            echo "::error::No coverage XML was downloaded from either upstream job."
            exit 1
          fi
          echo "Found ${#matches[@]} coverage XML file(s) to merge:"
          printf '  %s\n' "${matches[@]}"

      - name: Generate merged coverage report
        # MarkdownSummaryGithub feeds the step summary + sticky PR comment;
        # HtmlInline_AzurePipelines is the downloadable drill-down;
        # TextSummary is for log eyeballing. REPORTGENERATOR_LICENSE
        # (optional) unlocks Pro features when the secret is set — runs in
        # free-tier mode otherwise so CI doesn't break when the secret is
        # missing.
        env:
          REPORTGENERATOR_LICENSE: ${{ secrets.REPORTGENERATOR_LICENSE }}
        run: |
          dotnet tool restore
          dotnet tool run reportgenerator \
            "-reports:./coverage-artifacts/**/coverage.cobertura.xml" \
            "-targetdir:./coverage-artifacts/report" \
            "-reporttypes:MarkdownSummaryGithub;TextSummary;HtmlInline_AzurePipelines"

      - name: Render coverage on workflow summary
        run: cat ./coverage-artifacts/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: ./coverage-artifacts/report/SummaryGithub.md

      - name: Upload merged coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ steps.version.outputs.PackageVersion }}
          path: |
            ./coverage-artifacts/**/coverage.cobertura.xml
            ./coverage-artifacts/report/**
          if-no-files-found: error

  build:
    # Aggregate gate that resolves the historically-named "build" status
    # check still required by master's branch protection rules. Before
    # this PR the workflow had a single job literally called "build";
    # the rename to build-windows + the new build-linux / docker jobs
    # broke that name without an accompanying branch-protection update.
    # Rather than require an admin settings change to land this PR, we
    # restore the "build" check name as an aggregate that succeeds iff
    # all three platform jobs succeed. Future branch-protection updates
    # can promote build-windows / build-linux / docker to required and
    # drop this aggregate, but until then this keeps the contract
    # green-on-green-on-green = mergeable.
    #
    # integration-test-linux is intentionally NOT a dependency yet —
    # it runs in parallel as a non-blocking signal until we trust it.
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, docker]
    if: always()

    steps:
      - name: Aggregate per-platform results
        run: |
          windows='${{ needs.build-windows.result }}'
          linux='${{ needs.build-linux.result }}'
          docker='${{ needs.docker.result }}'
          echo "build-windows: ${windows}"
          echo "build-linux: ${linux}"
          echo "docker: ${docker}"
          if [[ "${windows}" != "success" || "${linux}" != "success" || "${docker}" != "success" ]]; then
            echo "::error::One or more platform jobs failed; aggregate build check fails."
            exit 1
          fi
          echo "All platform jobs succeeded."
